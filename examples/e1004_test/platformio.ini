; Standalone bb_epaper test for the Seeed reTerminal E1004 (T133A01).
; Build & flash from this folder:
;   cd examples/e1004_test
;   pio run -t upload
; Serial log is on the carrier USB-UART bridge (GPIO44/43) at 115200.
[platformio]
src_dir = .

[env:e1004_test]
platform = espressif32@6.12.0
board = seeed_xiao_esp32s3
framework = arduino
upload_speed = 460800
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.extra_flags =
	-D ARDUINO_XIAO_ESP32S3
	-D BOARD_HAS_PSRAM
build_flags =
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
lib_deps =
	symlink:///Users/mengdu/Desktop/bb_epaper
